<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Ward Management Subsystem</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --danger: #ff4d4d; --success: #2ecc71; --warning: #f1c40f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); transition: background 0.3s; text-align: center; padding: 20px; }
        .container { background: white; max-width: 800px; margin: 0 auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .panel { flex: 1; min-width: 300px; padding: 20px; border: 1px solid #eee; border-radius: 15px; }
        
        .status-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-weight: bold; padding: 5px 10px; border-radius: 15px; font-size: 0.8em; }
        .badge-secure { background: #e8f5e9; color: #2e7d32; }
        .badge-breach { background: #ffebee; color: #c62828; animation: blink 1s infinite; }
        .badge-call { background: #fff3e0; color: #ef6c00; }

        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; color: white; }
        .btn-breach { background: var(--danger); }
        .btn-nurse { background: var(--warning); color: #333; }
        .btn-reset { background: #3498db; width: 100%; margin-top: 15px; }

        #log-container { text-align: left; height: 200px; overflow-y: auto; background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 0.85em; }
        .log-entry { border-bottom: 1px solid #34495e; padding: 5px 0; }
        .log-time { color: #bdc3c7; margin-right: 10px; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body id="mainBody">

    <h1>🏥 Hospital Ward Subsystem</h1>

    <div class="container">
        <div class="panel">
            <h3>Live Status</h3>
            <div class="status-item"><span>System 1:</span> <span id="s1_badge" class="badge badge-secure">SECURE</span></div>
            <div class="status-item"><span>System 2:</span> <span id="s2_badge" class="badge badge-secure">SECURE</span></div>
            <div class="status-item"><span>System 3:</span> <span id="s3_badge" class="badge badge-secure">SECURE</span></div>
            <div class="status-item"><span>Nurse Call:</span> <span id="nurse_badge" class="badge badge-secure">IDLE</span></div>
            
            <button class="btn btn-reset" onclick="resetAll()">SYSTEM RESET / MUTE</button>
        </div>

        <div class="panel">
            <h3>Manual Controls</h3>
            <button class="btn btn-breach" onclick="updateDB('system1', 1)">Breach 1</button>
            <button class="btn btn-breach" onclick="updateDB('system2', 1)">Breach 2</button>
            <button class="btn btn-breach" onclick="updateDB('system3', 1)">Breach 3</button>
            <button class="btn btn-nurse" onclick="updateDB('nurse_call', 1)">🔔 NURSE CALL</button>
            
            <h4>Activity Log</h4>
            <div id="log-container">
                <div id="logs"></div>
            </div>
        </div>
    </div>

    <audio id="alarmSound" loop><source src="alert.mp3" type="audio/mpeg"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCePnTRSWFX-R0n4iIMLHIr0PZjk-WcHco",
            authDomain: "msesalert-b972d.firebaseapp.com",
            databaseURL: "https://msesalert-b972d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "msesalert-b972d",
            storageBucket: "msesalert-b972d.firebasestorage.app",
            messagingSenderId: "992963491194",
            appId: "1:992963491194:web:f0d0b95343114e067e52c3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const alarm = document.getElementById('alarmSound');

        function updateDB(path, val) { db.ref(path).set(val); }

        function resetAll() {
            updateDB('system1', 0); updateDB('system2', 0); 
            updateDB('system3', 0); updateDB('nurse_call', 0);
        }

        function addLog(message) {
            const logDiv = document.getElementById('logs');
            const now = new Date().toLocaleTimeString();
            const entry = `<div class="log-entry"><span class="log-time">[${now}]</span> ${message}</div>`;
            logDiv.innerHTML = entry + logDiv.innerHTML;
        }

        function setupListener(path, elementId, label) {
            db.ref(path).on('value', (snap) => {
                const val = snap.val();
                const el = document.getElementById(elementId);
                if (val === 1) {
                    el.innerText = "🚨 ACTIVE";
                    el.className = (path === 'nurse_call') ? "badge badge-call" : "badge badge-breach";
                    addLog(`ALERT: ${label} Triggered`);
                    checkGlobalState();
                } else {
                    el.innerText = (path === 'nurse_call') ? "IDLE" : "SECURE ✅";
                    el.className = "badge badge-secure";
                    checkGlobalState();
                }
            });
        }

        function checkGlobalState() {
            db.ref().once('value', (snap) => {
                const d = snap.val() || {};
                const active = (d.system1 == 1 || d.system2 == 1 || d.system3 == 1 || d.nurse_call == 1);
                if (active) {
                    document.body.style.backgroundColor = (d.nurse_call == 1 && !d.system1 && !d.system2 && !d.system3) ? "#fff9e6" : "#ffe6e6";
                    alarm.play().catch(() => {});
                } else {
                    document.body.style.backgroundColor = "#f4f7f6";
                    alarm.pause(); alarm.currentTime = 0;
                }
            });
        }

        setupListener('system1', 's1_badge', 'System 1 Breach');
        setupListener('system2', 's2_badge', 'System 2 Breach');
        setupListener('system3', 's3_badge', 'System 3 Breach');
        setupListener('nurse_call', 'nurse_badge', 'Nurse Call Button');
    </script>
</body>
</html>
