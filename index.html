<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AlertHub Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

.hidden { display:none; }
.visible { display:block; }

#login-screen {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  padding:10px;
  margin:5px;
}

button {
  padding:10px 15px;
  cursor:pointer;
}

/* Dashboard */
#dashboard {
  padding:20px;
}

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:15px;
  margin-top:20px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:10px;
}

.badge {
  padding:5px 10px;
  border-radius:5px;
  display:inline-block;
}

.badge-secure { background:green; }
.badge-breach { background:red; }
.badge-call { background:orange; }

/* logs */
#logs {
  margin-top:20px;
  background:#0f172a;
  padding:10px;
  height:200px;
  overflow:auto;
}

.log-entry { font-size:13px; margin-bottom:5px; }
.log-time { color:gray; }
.log-ok { color:lightgreen; }
.log-alert { color:orange; }
.log-kill { color:red; }

/* history table */
table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td, th {
  border:1px solid #333;
  padding:8px;
  font-size:13px;
}

.tbl-secure { color:lightgreen; }
.tbl-breach { color:red; }
.tbl-kill { color:orange; }
.tbl-call { color:yellow; }

/* killswitch banner */
#override-banner {
  display:none;
  background:red;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

#override-banner.visible {
  display:block;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>AlertHub Login</h2>
  <input type="password" id="pw-input" placeholder="Password">
  <button onclick="attemptLogin()">Login</button>
  <p id="login-err" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="topbar">
  <h2>AlertHub System</h2>
  <div id="clock"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="override-banner">⚠ KILLSWITCH ACTIVE ⚠</div>

<!-- SYSTEM CARDS -->
<div class="grid">
  <div class="card">
    System 1<br>
    <span id="s1_badge" class="badge badge-secure">SECURE</span><br><br>
    <button onclick="updateDB('system1',1)">Trigger</button>
  </div>

  <div class="card">
    System 2<br>
    <span id="s2_badge" class="badge badge-secure">SECURE</span><br><br>
    <button onclick="updateDB('system2',1)">Trigger</button>
  </div>

  <div class="card">
    System 3<br>
    <span id="s3_badge" class="badge badge-secure">SECURE</span><br><br>
    <button onclick="updateDB('system3',1)">Trigger</button>
  </div>

  <div class="card">
    Nurse Call<br>
    <span id="nurse_badge" class="badge badge-secure">IDLE</span><br><br>
    <button onclick="updateDB('nurse_call',1)">Call</button>
  </div>

  <div class="card">
    Killswitch
    <div id="kill-dot">🟢</div>
    <div id="kill-state-label">ARMED — SYSTEMS NOMINAL</div>
    <button onclick="updateDB('killswitch',1)">ACTIVATE</button>
    <button onclick="updateDB('killswitch',0)">RESET</button>
  </div>
</div>

<!-- LOGS -->
<h3>Live Logs</h3>
<div id="logs"></div>

<!-- HISTORY -->
<h3>History</h3>
<table>
  <thead>
    <tr>
      <th>Time</th>
      <th>Event</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="history-body"></tbody>
</table>

</div>

<!-- AUDIO -->
<audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

<!-- SCRIPT -->
<script>
/* ─────────────────────────────
   CONFIG
───────────────────────────── */
const DASHBOARD_PASSWORD = "ward2024";

/* ─────────────────────────────
   FIREBASE
───────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyCePnTRSWFX-R0n4iIMLHIr0PZjk-WcHco",
  authDomain: "msesalert-b972d.firebaseapp.com",
  databaseURL: "https://msesalert-b972d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "msesalert-b972d",
  storageBucket: "msesalert-b972d.firebasestorage.app",
  messagingSenderId: "992963491194",
  appId: "1:992963491194:web:f0d0b95343114e067e52c3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ─────────────────────────────
   CLOCK
───────────────────────────── */
setInterval(() => {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-GB");
}, 1000);

/* ─────────────────────────────
   DB
───────────────────────────── */
function updateDB(path,val){
  db.ref(path).set(val);
}

/* ─────────────────────────────
   LOGS
───────────────────────────── */
function addLog(msg,type="alert"){
  const logDiv=document.getElementById("logs");
  const time=new Date().toLocaleTimeString();

  logDiv.innerHTML=
  `<div class="log-entry">
  <span class="log-time">[${time}]</span> ${msg}
  </div>` + logDiv.innerHTML;
}

/* ─────────────────────────────
   LISTENERS
───────────────────────────── */
function listen(path, id, label){

  db.ref(path).on("value", snap=>{
    const val=snap.val();
    const el=document.getElementById(id);

    if(val===1){
      el.innerText="🚨 ACTIVE";
      el.className="badge badge-breach";
      addLog(label+" triggered");
    }else{
      el.innerText= path==="nurse_call" ? "IDLE" : "SECURE";
      el.className="badge badge-secure";
    }
  });

}

function start(){
  listen("system1","s1_badge","System 1");
  listen("system2","s2_badge","System 2");
  listen("system3","s3_badge","System 3");
  listen("nurse_call","nurse_badge","Nurse Call");
}

/* ─────────────────────────────
   LOGIN
───────────────────────────── */
function attemptLogin(){
  const pw=document.getElementById("pw-input").value;
  if(pw===DASHBOARD_PASSWORD){
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    start();
  }else{
    document.getElementById("login-err").innerText="Wrong password";
  }
}

function logout(){
  location.reload();
}
</script>

</body>
</html>
