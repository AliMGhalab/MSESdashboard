<!DOCTYPE html>
<html>
<head>
<title>Hospital Alert Advanced Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  margin-top:10px;
  padding:10px 20px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard {
  display:none;
  padding:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  margin-top:20px;
}

/* CARD */
.card {
  padding:20px;
  border-radius:16px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  text-align:center;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform: scale(1.02);
}

/* STATUS */
.secure { box-shadow: 0 0 10px green; }
.breach { box-shadow: 0 0 15px red; }
.call { box-shadow: 0 0 15px orange; }

/* KILLSWITCH */
#banner {
  display:none;
  background:red;
  padding:10px;
  text-align:center;
  font-weight:bold;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity:0.5; }
}
</style>
</head>

<body>

<div id="banner">⚠ KILLSWITCH ACTIVE ⚠</div>

<!-- LOGIN -->
<div id="login">
  <h2>Hospital Login</h2>
  <input id="pw" type="password" placeholder="Password">
  <button onclick="login()">Enter</button>
  <p id="err"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h1>Hospital Alert System</h1>

  <div class="grid">

    <div id="s1" class="card secure">System 1</div>
    <div id="s2" class="card secure">System 2</div>
    <div id="s3" class="card secure">System 3</div>
    <div id="nurse" class="card secure">Nurse Call</div>

  </div>

  <br>
  <button onclick="reset()">RESET ALL</button>
</div>

<!-- ALARM -->
<audio id="alarm" src="alert.mp3"></audio>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCePnTRSWFX-R0n4iIMLHIr0PZjk-WcHco",
  authDomain: "msesalert-b972d.firebaseapp.com",
  databaseURL: "https://msesalert-b972d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "msesalert-b972d",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const alarm = document.getElementById("alarm");

function playAlarm(){
  alarm.play().catch(()=>{});
}

function stopAlarm(){
  alarm.pause();
  alarm.currentTime = 0;
}

function login(){
  const pw = document.getElementById("pw").value;

  if(pw === "ward2024"){
    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").style.display="block";
    start();
  } else {
    document.getElementById("err").innerText="Wrong password";
  }
}

function setCard(id, state){
  const el = document.getElementById(id);

  el.classList.remove("secure","breach","call");

  if(state==="secure"){
    el.classList.add("secure");
  }
  if(state==="breach"){
    el.classList.add("breach");
  }
  if(state==="call"){
    el.classList.add("call");
  }
}

function start(){

  db.ref("system1").on("value", s=>{
    setCard("s1", s.val()===1 ? "breach":"secure");
  });

  db.ref("system2").on("value", s=>{
    setCard("s2", s.val()===1 ? "breach":"secure");
  });

  db.ref("system3").on("value", s=>{
    setCard("s3", s.val()===1 ? "breach":"secure");
  });

  db.ref("nurse_call").on("value", s=>{
    if(s.val()===1){
      setCard("nurse","call");
      playAlarm();
    } else {
      setCard("nurse","secure");
      stopAlarm();
    }
  });

  db.ref("killswitch").on("value", s=>{
    if(s.val()===1){
      document.getElementById("banner").style.display="block";
    } else {
      document.getElementById("banner").style.display="none";
    }
  });
}

function reset(){
  db.ref("system1").set(0);
  db.ref("system2").set(0);
  db.ref("system3").set(0);
  db.ref("nurse_call").set(0);
  db.ref("killswitch").set(0);
}

</script>

</body>
</html>
