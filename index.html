<script>
const DASHBOARD_PASSWORD = "ward2024";
const ADMIN_PIN = "1234";

const firebaseConfig = {
  apiKey: "AIzaSyCePnTRSWFX-R0n4iIMLHIr0PZjk-WcHco",
  authDomain: "msesalert-b972d.firebaseapp.com",
  databaseURL: "https://msesalert-b972d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "msesalert-b972d",
  storageBucket: "msesalert-b972d.firebasestorage.app",
  messagingSenderId: "992963491194",
  appId: "1:992963491194:web:f0d0b95343114e067e52c3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ───────── ALARM ───────── */
const alarm = document.getElementById("alarmSound");

function startAlarm() {
  alarm.currentTime = 0;
  alarm.play().catch(()=>{});
}

function stopAlarm() {
  alarm.pause();
  alarm.currentTime = 0;
}

/* ───────── LOGIN ───────── */
function attemptLogin() {
  const pw = document.getElementById("pw-input").value;

  if (pw === DASHBOARD_PASSWORD) {
    sessionStorage.setItem("auth", "1");
    showDashboard();
  } else {
    document.getElementById("login-err").textContent = "Incorrect password";
  }
}

function showDashboard() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("dashboard").classList.add("visible");
  startListeners();
}

function logout() {
  sessionStorage.removeItem("auth");
  location.reload();
}

/* ───────── FIREBASE UPDATE ───────── */
function updateDB(path, val) {
  db.ref(path).set(val);
}

function resetAll() {
  updateDB("system1", 0);
  updateDB("system2", 0);
  updateDB("system3", 0);
  updateDB("nurse_call", 0);
  updateDB("killswitch", 0);
}

/* ───────── UI UPDATE CORE (FIXED) ───────── */
function updateSystem(id, val) {
  const el = document.getElementById(id);

  if (val === 1) {
    el.className = "badge badge-breach";
    el.innerText = "BREACH !";
  } else {
    el.className = "badge badge-secure";
    el.innerText = "SECURE ✓";
  }
}

function updateCall(id, val) {
  const el = document.getElementById(id);

  if (val === 1) {
    el.className = "badge badge-call";
    el.innerText = "CALL !";
  } else {
    el.className = "badge badge-secure";
    el.innerText = "SECURE ✓";
  }
}

function updateKillswitch(val) {
  const banner = document.getElementById("override-banner");
  const dot = document.getElementById("kill-dot");

  if (val === 1) {
    banner.classList.add("visible");
    dot.classList.add("active");
  } else {
    banner.classList.remove("visible");
    dot.classList.remove("active");
  }
}

/* ───────── SINGLE REALTIME LISTENER (IMPORTANT FIX) ───────── */
function startListeners() {
  db.ref("/").on("value", snap => {
    const data = snap.val() || {};

    updateSystem("s1_badge", data.system1);
    updateSystem("s2_badge", data.system2);
    updateSystem("s3_badge", data.system3);

    updateCall("nurse_badge", data.nurse_call);

    updateKillswitch(data.killswitch);

    // Alarm logic (prevents spam triggering)
    const active =
      data.system1 === 1 ||
      data.system2 === 1 ||
      data.system3 === 1 ||
      data.nurse_call === 1 ||
      data.killswitch === 1;

    if (active) startAlarm();
    else stopAlarm();
  });
}

/* ───────── AUTO LOGIN ───────── */
window.onload = () => {
  if (sessionStorage.getItem("auth") === "1") {
    showDashboard();
  }
};
</script>
