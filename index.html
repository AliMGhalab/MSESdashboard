<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MSES Alert System</title>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#0b0f1a; color:white; text-align:center; }
button { margin:5px; padding:10px; }
.box { margin:10px; padding:10px; border:1px solid #333; display:inline-block; }
.secure { color:lime; }
.breach { color:red; }
.warn { color:orange; }
</style>
</head>

<body>

<h2>🏥 MSES ALERT DASHBOARD</h2>

<button onclick="set('system1',1)">Trigger System 1</button>
<button onclick="set('system2',1)">Trigger System 2</button>
<button onclick="set('system3',1)">Trigger System 3</button>
<button onclick="set('nurse_call',1)">Call Technician</button>
<button onclick="set('killswitch',1)">KILLSWITCH ON</button>
<button onclick="set('killswitch',0)">KILLSWITCH OFF</button>
<button onclick="resetAll()">RESET</button>

<hr>

<div class="box">System 1: <span id="s1">--</span></div>
<div class="box">System 2: <span id="s2">--</span></div>
<div class="box">System 3: <span id="s3">--</span></div>
<div class="box">Technician: <span id="tech">--</span></div>
<div class="box">Killswitch: <span id="kill">--</span></div>

<hr>

<h3>Logs</h3>
<div id="logs"></div>

<script>
/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCePnTRSWFX-R0n4iIMLHIr0PZjk-WcHco",
  authDomain: "msesalert-b972d.firebaseapp.com",
  databaseURL: "https://msesalert-b972d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "msesalert-b972d",
  storageBucket: "msesalert-b972d.firebasestorage.app",
  messagingSenderId: "992963491194",
  appId: "1:992963491194:web:f0d0b95343114e067e52c3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ---------------- WRITE ---------------- */
function set(path,val){
  db.ref(path).set(val);
}

/* ---------------- RESET ---------------- */
function resetAll(){
  set('system1',0);
  set('system2',0);
  set('system3',0);
  set('nurse_call',0);
}

/* ---------------- LOGS ---------------- */
function addLog(msg,type){
  const div = document.getElementById("logs");
  const p = document.createElement("p");
  p.innerText = msg;
  p.className = type;
  div.prepend(p);
}

/* ---------------- LISTENER ---------------- */
const prev = {};

function listen(path,id,label){

  db.ref(path).on('value', snap=>{
    const val = snap.val();
    const el = document.getElementById(id);

    const old = prev[path];
    prev[path] = val;

    if(val === 1){
      if(path === "nurse_call"){
        el.innerText = "ACTIVE";
        el.className = "warn";
        addLog("Technician requested", "warn");
      } else {
        el.innerText = "BREACH";
        el.className = "breach";
        addLog(label + " BREACH detected", "breach");
      }
    } else {
      el.innerText = "SECURE";
      el.className = "secure";

      if(old === 1){
        addLog(label + " restored", "secure");
      }
    }
  });
}

/* ---------------- START ---------------- */
listen('system1','s1','System 1');
listen('system2','s2','System 2');
listen('system3','s3','System 3');
listen('nurse_call','tech','Technician');

db.ref('killswitch').on('value', snap=>{
  const v = snap.val();
  const el = document.getElementById("kill");

  el.innerText = v === 1 ? "ACTIVE" : "OFF";

  if(v === 1){
    addLog("KILLSWITCH ACTIVATED", "breach");
  }
});
</script>

</body>
</html>
