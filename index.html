<!DOCTYPE html>
<html>
<head>
  <title>Hospital Alert System</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; text-align:center; }

    .hidden { display:none; }
    .visible { display:block; }

    .badge { padding:10px; margin:10px; display:inline-block; border-radius:10px; }
    .badge-secure { background:green; }
    .badge-breach { background:red; }
    .badge-call { background:orange; }
    .badge-override { background:purple; }

    #dashboard { margin-top:20px; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>LOGIN</h2>
  <input id="pw-input" type="password" placeholder="Password">
  <button onclick="attemptLogin()">Enter</button>
  <p id="login-err"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <h1>Hospital Alert Dashboard</h1>

  <div>
    <div id="s1_badge" class="badge badge-secure">SECURE</div>
    <div id="s2_badge" class="badge badge-secure">SECURE</div>
    <div id="s3_badge" class="badge badge-secure">SECURE</div>
    <div id="nurse_badge" class="badge badge-secure">SECURE</div>
  </div>

  <button onclick="resetAll()">RESET ALL</button>
</div>

<!-- ALARM SOUND -->
<audio id="alarmSound" src="alert.mp3"></audio>

<script>
const DASHBOARD_PASSWORD = "ward2024";

const firebaseConfig = {
  apiKey: "AIzaSyCePnTRSWFX-R0n4iIMLHIr0PZjk-WcHco",
  authDomain: "msesalert-b972d.firebaseapp.com",
  databaseURL: "https://msesalert-b972d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "msesalert-b972d",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const alarm = document.getElementById("alarmSound");

function startAlarm() {
  alarm.play().catch(()=>{});
}

function stopAlarm() {
  alarm.pause();
  alarm.currentTime = 0;
}

function attemptLogin() {
  const pw = document.getElementById("pw-input").value;

  if (pw === DASHBOARD_PASSWORD) {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    startListeners();
  } else {
    document.getElementById("login-err").innerText = "Wrong password";
  }
}

function setBadge(id, type) {
  const el = document.getElementById(id);

  if (type === "secure") {
    el.className = "badge badge-secure";
    el.innerText = "SECURE";
  }
  if (type === "breach") {
    el.className = "badge badge-breach";
    el.innerText = "BREACH";
  }
  if (type === "call") {
    el.className = "badge badge-call";
    el.innerText = "CALL";
  }
}

function resetAll() {
  db.ref("system1").set(0);
  db.ref("system2").set(0);
  db.ref("system3").set(0);
  db.ref("nurse_call").set(0);
}

function startListeners() {

  db.ref("system1").on("value", s => {
    s.val() === 1 ? setBadge("s1_badge","breach") : setBadge("s1_badge","secure");
  });

  db.ref("system2").on("value", s => {
    s.val() === 1 ? setBadge("s2_badge","breach") : setBadge("s2_badge","secure");
  });

  db.ref("system3").on("value", s => {
    s.val() === 1 ? setBadge("s3_badge","breach") : setBadge("s3_badge","secure");
  });

  db.ref("nurse_call").on("value", s => {
    if (s.val() === 1) {
      setBadge("nurse_badge","call");
      startAlarm();
    } else {
      setBadge("nurse_badge","secure");
      stopAlarm();
    }
  });
}

window.onload = () => {
  if (sessionStorage.getItem("auth") === "1") {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    startListeners();
  }
};
</script>

</body>
</html>
