<!DOCTYPE html>
<html>
<head>
<title>Advanced Hospital Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

/* BACKGROUND */
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0b1220, #020617);
  color:white;
}

/* LOGIN */
#login-screen {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  margin-top:10px;
  padding:10px 18px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard {
  display:none;
  padding:20px;
}

.visible {
  display:block;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:15px;
  margin-top:20px;
}

/* BADGES */
.badge {
  padding:18px;
  border-radius:14px;
  text-align:center;
  font-weight:bold;
  transition:0.3s;
  background: rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
}

/* STATES */
.badge-secure { box-shadow:0 0 10px green; }
.badge-breach { box-shadow:0 0 15px red; }
.badge-call { box-shadow:0 0 15px orange; }
.badge-override { box-shadow:0 0 15px purple; }

/* LOGIN ERROR */
#login-err {
  color:red;
  margin-top:10px;
}

/* KILLSWITCH */
#override-banner {
  display:none;
  background:red;
  padding:10px;
  text-align:center;
  font-weight:bold;
  animation:blink 1s infinite;
}

#override-banner.visible {
  display:block;
}

@keyframes blink {
  50% { opacity:0.5; }
}

</style>
</head>

<body>

<!-- KILLSWITCH -->
<div id="override-banner">⚠ SYSTEM OVERRIDE ACTIVE ⚠</div>

<!-- LOGIN -->
<div id="login-screen">
  <h2>Hospital Login</h2>
  <input id="pw-input" type="password" placeholder="Enter Password">
  <button onclick="attemptLogin()">Login</button>
  <div id="login-err"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <h1>Advanced Hospital System</h1>

  <button onclick="resetAll()">RESET ALL</button>
  <button onclick="logout()">LOGOUT</button>

  <div class="grid">

    <div id="s1_badge" class="badge badge-secure">SYSTEM 1</div>
    <div id="s2_badge" class="badge badge-secure">SYSTEM 2</div>
    <div id="s3_badge" class="badge badge-secure">SYSTEM 3</div>
    <div id="nurse_badge" class="badge badge-secure">NURSE CALL</div>

  </div>

</div>

<!-- AUDIO -->
<audio id="alarmSound" src="alert.mp3"></audio>

<!-- YOUR SCRIPT (UNCHANGED) -->
<script>
const DASHBOARD_PASSWORD = "ward2024";
const ADMIN_PIN = "1234";

const firebaseConfig = {
  apiKey: "AIzaSyCePnTRSWFX-R0n4iIMLHIr0PZjk-WcHco",
  authDomain: "msesalert-b972d.firebaseapp.com",
  databaseURL: "https://msesalert-b972d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "msesalert-b972d",
  storageBucket: "msesalert-b972d.firebasestorage.app",
  messagingSenderId: "992963491194",
  appId: "1:992963491194:web:f0d0b95343114e067e52c3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const alarm = document.getElementById("alarmSound");

function startAlarm() {
  alarm.currentTime = 0;
  alarm.play().catch(()=>{});
}

function stopAlarm() {
  alarm.pause();
  alarm.currentTime = 0;
}

function attemptLogin() {
  const pw = document.getElementById("pw-input").value;
  if (pw === DASHBOARD_PASSWORD) {
    sessionStorage.setItem("auth", "1");
    showDashboard();
  } else {
    document.getElementById("login-err").textContent = "Incorrect password";
  }
}

function showDashboard() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("dashboard").classList.add("visible");
  startListeners();
}

function logout() {
  sessionStorage.removeItem("auth");
  location.reload();
}

function updateDB(path, val) {
  db.ref(path).set(val);
}

function resetAll() {
  updateDB("system1",0);
  updateDB("system2",0);
  updateDB("system3",0);
  updateDB("nurse_call",0);
  updateDB("killswitch",0);
}

function setBadge(id, state, type) {
  const el = document.getElementById(id);

  if (type === "secure") {
    el.className = "badge badge-secure";
    el.innerText = "SECURE ✓";
  }
  if (type === "breach") {
    el.className = "badge badge-breach";
    el.innerText = "BREACH !";
  }
  if (type === "call") {
    el.className = "badge badge-call";
    el.innerText = "CALL !";
  }
  if (type === "override") {
    el.className = "badge badge-override";
    el.innerText = "OVERRIDE";
  }
}

function startListeners() {

  db.ref("system1").on("value", snap => {
    snap.val() === 1 ? setBadge("s1_badge",1,"breach") : setBadge("s1_badge",0,"secure");
  });

  db.ref("system2").on("value", snap => {
    snap.val() === 1 ? setBadge("s2_badge",1,"breach") : setBadge("s2_badge",0,"secure");
  });

  db.ref("system3").on("value", snap => {
    snap.val() === 1 ? setBadge("s3_badge",1,"breach") : setBadge("s3_badge",0,"secure");
  });

  db.ref("nurse_call").on("value", snap => {
    snap.val() === 1
      ? setBadge("nurse_badge",1,"call")
      : setBadge("nurse_badge",0,"secure");
  });

  db.ref("killswitch").on("value", snap => {
    const val = snap.val();
    const banner = document.getElementById("override-banner");

    if (val === 1) {
      banner.classList.add("visible");
      startAlarm();
    } else {
      banner.classList.remove("visible");
      stopAlarm();
    }
  });
}

window.onload = () => {
  if (sessionStorage.getItem("auth") === "1") {
    showDashboard();
  }
};
</script>

</body>
</html>
